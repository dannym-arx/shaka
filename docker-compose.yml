# Shaka — isolated test environments
#
# Usage:
#   docker compose run --rm opencode          # run all checks (typecheck + lint + test)
#   docker compose run --rm opencode bun test # run tests only
#   docker compose run --rm opencode bun run typecheck
#   docker compose run --rm opencode bun run src/index.ts init
#   docker compose run --rm opencode sh       # interactive shell inside container
#   docker compose run --rm claudecode sh     # interactive shell inside container
#
# E2E tests:
#   docker compose run --rm opencode bash test/e2e/opencode.sh
#   docker compose run --rm claudecode bash test/e2e/claudecode.sh
#
# Claude auth: CLAUDE_CODE_OAUTH_TOKEN from root .env (gitignored).
# Generate token: claude setup-token → paste into .env as CLAUDE_CODE_OAUTH_TOKEN=<token>

services:
  opencode:
    build:
      context: .
      dockerfile: dockerfile-opencode
    image: shaka-opencode

  claudecode:
    build:
      context: .
      dockerfile: dockerfile-claudecode
    image: shaka-claudecode
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
